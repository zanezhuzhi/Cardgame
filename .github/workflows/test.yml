# .github/workflows/test.yml
# 自动化测试 CI - 在 push 和 PR 时运行 shared 和 server 测试

name: 🧪 Unit Tests

on:
  push:
    branches: [main, dev]
    paths:
      - 'shared/**'
      - 'server/**'
      - '.github/workflows/test.yml'
  pull_request:
    branches: [main]
    paths:
      - 'shared/**'
      - 'server/**'

jobs:
  test-shared:
    name: 📦 Shared Tests
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: shared/package-lock.json
      
      - name: Install dependencies
        working-directory: shared
        run: npm ci
      
      - name: Run tests
        working-directory: shared
        run: npm test
      
      - name: Generate coverage report
        working-directory: shared
        run: npm run test:coverage
        continue-on-error: true

  test-server:
    name: 🖥️ Server Tests
    runs-on: ubuntu-latest
    needs: test-shared  # server 依赖 shared 类型
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json
      
      - name: Install shared dependencies
        working-directory: shared
        run: npm ci
      
      - name: Install server dependencies
        working-directory: server
        run: npm ci
      
      - name: Run tests
        working-directory: server
        run: npm test

  # 汇总结果
  test-summary:
    name: ✅ Test Summary
    runs-on: ubuntu-latest
    needs: [test-shared, test-server]
    if: always()
    
    steps:
      - name: Check test results
        run: |
          if [ "${{ needs.test-shared.result }}" == "success" ] && [ "${{ needs.test-server.result }}" == "success" ]; then
            echo "✅ All tests passed!"
            exit 0
          else
            echo "❌ Some tests failed"
            echo "  - shared: ${{ needs.test-shared.result }}"
            echo "  - server: ${{ needs.test-server.result }}"
            exit 1
          fi
