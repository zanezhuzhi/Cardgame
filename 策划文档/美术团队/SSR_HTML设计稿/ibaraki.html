<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>茨木童子 - 御魂传说 SSR</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #0a0a14; }
        .card { width: 400px; height: 560px; background: linear-gradient(180deg, #1a1a2e 0%, #2d1f3d 50%, #1a1a2e 100%); border: 8px solid #d4a574; border-radius: 8px; position: relative; overflow: hidden; box-shadow: 0 0 30px rgba(212, 165, 116, 0.4); }
        .card::before { content: ''; position: absolute; top: -2px; left: -2px; right: -2px; bottom: -2px; border: 2px solid #ffd700; border-radius: 10px; opacity: 0.6; animation: goldGlow 3s ease-in-out infinite; }
        @keyframes goldGlow { 0%, 100% { opacity: 0.4; } 50% { opacity: 0.8; } }
        .rage-aura { position: absolute; width: 100%; height: 100%; background: radial-gradient(ellipse at center, rgba(139, 0, 0, 0.3) 0%, transparent 70%); pointer-events: none; animation: pulse 2s ease-in-out infinite; }
        @keyframes pulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 0.8; } }
        .claw-effect { position: absolute; top: 60px; right: 40px; width: 150px; height: 150px; }
        .claw-effect::before, .claw-effect::after { content: ''; position: absolute; background: #8b0000; border-radius: 2px; }
        .claw-effect::before { width: 100px; height: 8px; top: 50px; left: 0; transform: rotate(-30deg); box-shadow: 0 0 20px rgba(139, 0, 0, 0.8); }
        .claw-effect::after { width: 80px; height: 8px; top: 80px; right: 0; transform: rotate(20deg); box-shadow: 0 0 20px rgba(139, 0, 0, 0.8); }
        .rarity { position: absolute; top: 15px; left: 15px; font-size: 14px; color: #ffd700; text-shadow: 0 0 10px #ffd700; font-weight: bold; }
        .charm { position: absolute; top: 15px; right: 15px; background: linear-gradient(135deg, #d4a574, #ffd700); color: #1a1a2e; padding: 4px 12px; border-radius: 12px; font-weight: bold; }
        .name-box { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); background: linear-gradient(180deg, #2d1f3d 0%, #1a1a2e 100%); border: 2px solid #d4a574; border-radius: 4px; padding: 8px 24px; text-align: center; }
        .name-box h2 { color: #ffd700; font-size: 22px; font-weight: bold; letter-spacing: 4px; }
        .name-box .skill { color: #ff6b6b; font-size: 12px; margin-top: 4px; letter-spacing: 2px; }
        .character { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); width: 360px; height: 440px; }
        .particles { position: absolute; width: 100%; height: 100%; pointer-events: none; }
        .particle { position: absolute; width: 4px; height: 4px; background: #ff6b6b; border-radius: 50%; animation: float 3s ease-in-out infinite; }
        .particle:nth-child(1) { top: 100px; left: 50px; animation-delay: 0s; }
        .particle:nth-child(2) { top: 200px; right: 60px; animation-delay: 0.5s; }
        .particle:nth-child(3) { top: 300px; left: 80px; animation-delay: 1s; }
        @keyframes float { 0%, 100% { transform: translateY(0); opacity: 0.6; } 50% { transform: translateY(-15px); opacity: 1; } }
    </style>
</head>
<body>
    <div class="card">
        <div class="rage-aura"></div>
        <div class="claw-effect"></div>
        <div class="particles"><div class="particle"></div><div class="particle"></div><div class="particle"></div></div>
        <div class="rarity">SSR</div><div class="charm">+3</div>
        <div class="character">
            <svg viewBox="0 0 360 440">
                <defs>
                    <linearGradient id="skinGrad2" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" style="stop-color:#9e8b7d"/><stop offset="100%" style="stop-color:#7a6b5d"/></linearGradient>
                    <linearGradient id="armorGrad2" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" style="stop-color:#2d2d2d"/><stop offset="100%" style="stop-color:#1a1a1a"/></linearGradient>
                    <filter id="redGlow"><feGaussianBlur stdDeviation="3" result="coloredBlur"/><feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
                </defs>
                <ellipse cx="180" cy="230" rx="65" ry="95" fill="url(#skinGrad2)"/>
                <path d="M115 190 Q85 230 90 330 Q95 390 115 410 L245 410 Q265 390 270 330 Q275 230 245 190 Q215 170 180 170 Q145 170 115 190" fill="url(#armorGrad2)"/>
                <ellipse cx="110" cy="195" rx="30" ry="20" fill="#3d3d3d" stroke="#d4a574" stroke-width="2"/>
                <ellipse cx="250" cy="195" rx="30" ry="20" fill="#3d3d3d" stroke="#d4a574" stroke-width="2"/>
                <!-- 断臂 -->
                <path d="M110 220 Q70 250 40 280" stroke="url(#skinGrad2)" stroke-width="30" fill="none" stroke-linecap="round"/>
                <ellipse cx="40" cy="280" rx="15" ry="12" fill="#5a4a3a"/>
                <ellipse cx="40" cy="280" rx="8" ry="6" fill="#3a2a1a"/>
                <!-- 爪击右手 -->
                <path d="M250 220 Q290 230 310 200" stroke="url(#skinGrad2)" stroke-width="28" fill="none" stroke-linecap="round"/>
                <path d="M310 200 L340 180" stroke="#d4a574" stroke-width="8" fill="none" stroke-linecap="round"/>
                <path d="M310 200 L345 195" stroke="#d4a574" stroke-width="6" fill="none" stroke-linecap="round"/>
                <path d="M310 200 L340 210" stroke="#d4a574" stroke-width="7" fill="none" stroke-linecap="round"/>
                <!-- 鬼角 -->
                <path d="M130 95 Q115 50 105 20 Q110 15 120 25 Q135 55 140 95" fill="#d4a574" stroke="#ffd700" stroke-width="1"/>
                <path d="M200 95 Q215 50 225 20 Q220 15 210 25 Q195 55 190 95" fill="#d4a574" stroke="#ffd700" stroke-width="1"/>
                <!-- 脸部 -->
                <ellipse cx="165" cy="115" rx="50" ry="55" fill="url(#skinGrad2)"/>
                <path d="M125 105 Q140 95 155 105" stroke="#1a1a2e" stroke-width="4" fill="none"/>
                <path d="M175 105 Q190 95 205 105" stroke="#1a1a2e" stroke-width="4" fill="none"/>
                <circle cx="140" cy="115" r="8" fill="#1a1a2e"/><circle cx="190" cy="115" r="8" fill="#1a1a2e"/>
                <circle cx="140" cy="115" r="4" fill="#ff6b6b" filter="url(#redGlow)"/>
                <circle cx="190" cy="115" r="4" fill="#ff6b6b" filter="url(#redGlow)"/>
                <path d="M155 140 Q165 145 175 140" stroke="#5a4a3a" stroke-width="3" fill="none"/>
                <path d="M145 155 Q165 165 185 155" stroke="#1a1a2e" stroke-width="2" fill="none"/>
                <path d="M150 155 L155 162 L160 155" fill="#d4a574"/>
                <path d="M170 155 L175 162 L180 155" fill="#d4a574"/>
            </svg>
        </div>
        <div class="name-box"><h2>茨木童子</h2><div class="skill">「迁怒」</div></div>
    </div>
</body>
</html>
