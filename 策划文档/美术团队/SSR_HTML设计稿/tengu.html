<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大天狗 - 御魂传说 SSR</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #0a0a14; font-family: serif; }
        .card { width: 400px; height: 560px; background: linear-gradient(180deg, #1a1a2e 0%, #1e3a5f 50%, #1a1a2e 100%); border: 8px solid #d4a574; border-radius: 8px; position: relative; overflow: hidden; box-shadow: 0 0 30px rgba(212, 165, 116, 0.4), inset 0 0 60px rgba(0, 0, 0, 0.5); }
        .card::before { content: ''; position: absolute; top: -2px; left: -2px; right: -2px; bottom: -2px; border: 2px solid #ffd700; border-radius: 10px; opacity: 0.6; animation: goldGlow 3s ease-in-out infinite; }
        @keyframes goldGlow { 0%, 100% { opacity: 0.4; } 50% { opacity: 0.8; } }
        .wind-blades { position: absolute; width: 100%; height: 100%; pointer-events: none; }
        .wind-blade { position: absolute; background: linear-gradient(90deg, transparent, #ffd700, transparent); height: 3px; animation: windFlow 2s ease-in-out infinite; }
        .wind-blade:nth-child(1) { top: 100px; width: 150px; left: -50px; transform: rotate(-20deg); animation-delay: 0s; }
        .wind-blade:nth-child(2) { top: 180px; width: 120px; right: -30px; transform: rotate(15deg); animation-delay: 0.3s; }
        .wind-blade:nth-child(3) { top: 260px; width: 100px; left: -20px; transform: rotate(-10deg); animation-delay: 0.6s; }
        .wind-blade:nth-child(4) { top: 340px; width: 130px; right: -40px; transform: rotate(25deg); animation-delay: 0.9s; }
        @keyframes windFlow { 0% { transform: translateX(-20px); opacity: 0; } 50% { opacity: 1; } 100% { transform: translateX(40px); opacity: 0; } }
        .clouds { position: absolute; bottom: 80px; left: 0; right: 0; height: 120px; background: linear-gradient(0deg, rgba(30, 58, 95, 0.8) 0%, transparent 100%); }
        .cloud { position: absolute; background: rgba(255, 255, 255, 0.1); border-radius: 50%; filter: blur(10px); }
        .cloud:nth-child(1) { width: 100px; height: 40px; bottom: 20px; left: 30px; }
        .cloud:nth-child(2) { width: 80px; height: 30px; bottom: 40px; right: 50px; }
        .character { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); width: 360px; height: 440px; }
        .rarity { position: absolute; top: 15px; left: 15px; font-size: 14px; color: #ffd700; text-shadow: 0 0 10px #ffd700; font-weight: bold; letter-spacing: 2px; }
        .charm { position: absolute; top: 15px; right: 15px; background: linear-gradient(135deg, #d4a574, #ffd700); color: #1a1a2e; padding: 4px 12px; border-radius: 12px; font-weight: bold; font-size: 14px; }
        .name-box { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); background: linear-gradient(180deg, #1e3a5f 0%, #1a1a2e 100%); border: 2px solid #d4a574; border-radius: 4px; padding: 8px 24px; text-align: center; }
        .name-box h2 { color: #ffd700; font-size: 22px; font-weight: bold; text-shadow: 0 0 10px rgba(255, 215, 0, 0.5); letter-spacing: 4px; }
        .name-box .skill { color: #4fc3f7; font-size: 12px; margin-top: 4px; letter-spacing: 2px; }
        .particles { position: absolute; width: 100%; height: 100%; pointer-events: none; }
        .particle { position: absolute; width: 4px; height: 4px; background: #ffd700; border-radius: 50%; animation: float 4s ease-in-out infinite; }
        .particle:nth-child(1) { top: 80px; left: 30px; animation-delay: 0s; }
        .particle:nth-child(2) { top: 200px; right: 40px; animation-delay: 1s; }
        .particle:nth-child(3) { top: 350px; left: 60px; animation-delay: 2s; }
        @keyframes float { 0%, 100% { transform: translateY(0) scale(1); opacity: 0.6; } 50% { transform: translateY(-20px) scale(1.5); opacity: 1; } }
    </style>
</head>
<body>
    <div class="card">
        <div class="wind-blades">
            <div class="wind-blade"></div><div class="wind-blade"></div><div class="wind-blade"></div><div class="wind-blade"></div>
        </div>
        <div class="particles"><div class="particle"></div><div class="particle"></div><div class="particle"></div></div>
        <div class="rarity">SSR</div><div class="charm">+3</div>
        <div class="character">
            <svg class="character-svg" viewBox="0 0 360 440">
                <defs>
                    <linearGradient id="wingGrad" x1="0%" y1="0%" x2="100%" y2="0%">
                        <stop offset="0%" style="stop-color:#0a0a14"/><stop offset="50%" style="stop-color:#1a1a2e"/><stop offset="100%" style="stop-color:#0a0a14"/>
                    </linearGradient>
                    <linearGradient id="skinGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                        <stop offset="0%" style="stop-color:#8b4513"/><stop offset="100%" style="stop-color:#654321"/>
                    </linearGradient>
                    <linearGradient id="robeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                        <stop offset="0%" style="stop-color:#1a1a2e"/><stop offset="100%" style="stop-color:#0d0d1a"/>
                    </linearGradient>
                    <filter id="glow"><feGaussianBlur stdDeviation="3" result="coloredBlur"/><feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
                </defs>
                <!-- 巨大乌鸦翅膀 -->
                <path d="M180 120 Q100 80 20 120 Q-20 180 10 250 Q30 300 80 280 Q50 220 80 160 Q100 120 180 140" fill="url(#wingGrad)" stroke="#2d1f3d" stroke-width="2"/>
                <path d="M180 120 Q260 80 340 120 Q380 180 350 250 Q330 300 280 280 Q310 220 280 160 Q260 120 180 140" fill="url(#wingGrad)" stroke="#2d1f3d" stroke-width="2"/>
                <!-- 身体 -->
                <ellipse cx="180" cy="200" rx="50" ry="80" fill="url(#skinGrad)"/>
                <!-- 狩衣 -->
                <path d="M130 160 Q110 200 105 280 Q100 360 110 400 L250 400 Q260 360 255 280 Q250 200 230 160 Q205 145 180 145 Q155 145 130 160" fill="url(#robeGrad)"/>
                <!-- 宽大衣袖 -->
                <path d="M130 180 Q80 200 60 260 Q50 300 70 320 Q90 310 100 280 Q110 240 130 220" fill="url(#robeGrad)"/>
                <path d="M230 180 Q280 200 300 260 Q310 300 290 320 Q270 310 260 280 Q250 240 230 220" fill="url(#robeGrad)"/>
                <!-- 金色束腰带 -->
                <rect x="125" y="260" width="110" height="15" fill="#d4a574"/>
                <!-- 脸部 -->
                <ellipse cx="180" cy="100" rx="40" ry="50" fill="url(#skinGrad)"/>
                <!-- 长鼻 -->
                <path d="M180 80 Q185 60 190 50 Q195 40 200 50 Q195 65 190 85" fill="#8b4513"/>
                <!-- 威严表情 -->
                <circle cx="165" cy="90" r="5" fill="#1a1a2e"/><circle cx="195" cy="90" r="5" fill="#1a1a2e"/>
                <circle cx="165" cy="90" r="2" fill="#ffd700" filter="url(#glow)"/><circle cx="195" cy="90" r="2" fill="#ffd700" filter="url(#glow)"/>
                <!-- 眉毛 -->
                <path d="M155 80 Q165 75 175 80" stroke="#1a1a2e" stroke-width="3" fill="none"/>
                <path d="M185 80 Q195 75 205 80" stroke="#1a1a2e" stroke-width="3" fill="none"/>
                <!-- 展开双臂 -->
                <path d="M70 220 Q40 200 20 180" stroke="#8b4513" stroke-width="20" fill="none" stroke-linecap="round"/>
                <path d="M290 220 Q320 200 340 180" stroke="#8b4513" stroke-width="20" fill="none" stroke-linecap="round"/>
            </svg>
        </div>
        <div class="clouds"><div class="cloud"></div><div class="cloud"></div></div>
        <div class="name-box"><h2>大天狗</h2><div class="skill">「羽刃暴风」</div></div>
    </div>
</body>
</html>
