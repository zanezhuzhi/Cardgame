<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>妖刀姬 - 御魂传说 SSR</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #0a0a14;
            font-family: serif;
        }
        .card {
            width: 400px;
            height: 560px;
            background: linear-gradient(180deg, #1a1a2e 0%, #2d1f3d 50%, #1a1a2e 100%);
            border: 8px solid #d4a574;
            border-radius: 8px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(212, 165, 116, 0.4), inset 0 0 60px rgba(0, 0, 0, 0.5);
        }
        /* 金色边框光效 */
        .card::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            border: 2px solid #ffd700;
            border-radius: 10px;
            opacity: 0.6;
            animation: goldGlow 3s ease-in-out infinite;
        }
        @keyframes goldGlow {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 0.8; }
        }
        /* 樱花装饰 */
        .sakura {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        .sakura span {
            position: absolute;
            background: #ffb7c5;
            border-radius: 50% 0 50% 50%;
            opacity: 0.6;
        }
        .sakura span:nth-child(1) { width: 12px; height: 12px; top: 80px; left: 30px; transform: rotate(45deg); }
        .sakura span:nth-child(2) { width: 8px; height: 8px; top: 120px; right: 50px; transform: rotate(30deg); }
        .sakura span:nth-child(3) { width: 10px; height: 10px; bottom: 200px; left: 60px; transform: rotate(60deg); }
        .sakura span:nth-child(4) { width: 6px; height: 6px; top: 200px; right: 80px; transform: rotate(15deg); }
        .sakura span:nth-child(5) { width: 9px; height: 9px; bottom: 280px; right: 40px; transform: rotate(75deg); }
        /* 云纹装饰 */
        .cloud-pattern {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 150px;
            background: linear-gradient(0deg, rgba(45, 31, 61, 0.9) 0%, transparent 100%);
        }
        /* 角色区域 */
        .character {
            position: absolute;
            top: 40px;
            left: 50%;
            transform: translateX(-50%);
            width: 320px;
            height: 420px;
        }
        /* 人物剪影 SVG */
        .character-silhouette {
            width: 100%;
            height: 100%;
        }
        /* 刀光效果 */
        .blade-light {
            position: absolute;
            top: 60px;
            right: 30px;
            width: 200px;
            height: 300px;
            background: linear-gradient(135deg, rgba(255, 0, 0, 0.3) 0%, rgba(139, 0, 0, 0.1) 50%, transparent 100%);
            transform: rotate(-30deg);
            filter: blur(20px);
            animation: bladeFlash 2s ease-in-out infinite;
        }
        @keyframes bladeFlash {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }
        /* 妖刀 */
        .cursed-blade {
            position: absolute;
            top: 80px;
            right: 20px;
            width: 180px;
            height: 20px;
            background: linear-gradient(90deg, #8b0000, #ff0000, #8b0000);
            transform: rotate(-45deg);
            border-radius: 2px;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.8), 0 0 40px rgba(255, 0, 0, 0.4);
        }
        .cursed-blade::before {
            content: '';
            position: absolute;
            top: -5px;
            left: 0;
            right: 0;
            height: 30px;
            background: linear-gradient(90deg, transparent, rgba(255, 0, 0, 0.5), transparent);
            filter: blur(8px);
        }
        /* 符文 */
        .runes {
            position: absolute;
            font-size: 10px;
            color: #ffd700;
            text-shadow: 0 0 10px #ffd700;
            font-family: serif;
        }
        .runes:nth-child(1) { top: 95px; right: 60px; }
        .runes:nth-child(2) { top: 130px; right: 100px; }
        .runes:nth-child(3) { top: 170px; right: 130px; }
        /* 名称框 */
        .name-box {
            position: absolute;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(180deg, #2d1f3d 0%, #1a1a2e 100%);
            border: 2px solid #d4a574;
            border-radius: 4px;
            padding: 8px 24px;
            text-align: center;
        }
        .name-box h2 {
            color: #ffd700;
            font-size: 22px;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
            letter-spacing: 4px;
        }
        .name-box .skill {
            color: #ffb7c5;
            font-size: 12px;
            margin-top: 4px;
            letter-spacing: 2px;
        }
        /* 稀有度标识 */
        .rarity {
            position: absolute;
            top: 15px;
            left: 15px;
            font-size: 14px;
            color: #ffd700;
            text-shadow: 0 0 10px #ffd700;
            font-weight: bold;
            letter-spacing: 2px;
        }
        /* 声誉值 */
        .charm {
            position: absolute;
            top: 15px;
            right: 15px;
            background: linear-gradient(135deg, #d4a574, #ffd700);
            color: #1a1a2e;
            padding: 4px 12px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 14px;
        }
        /* 粒子光效 */
        .particles {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: #ffd700;
            border-radius: 50%;
            animation: float 4s ease-in-out infinite;
        }
        .particle:nth-child(1) { top: 100px; left: 50px; animation-delay: 0s; }
        .particle:nth-child(2) { top: 200px; right: 60px; animation-delay: 1s; }
        .particle:nth-child(3) { top: 300px; left: 80px; animation-delay: 2s; }
        .particle:nth-child(4) { top: 150px; right: 100px; animation-delay: 0.5s; }
        .particle:nth-child(5) { top: 350px; left: 60px; animation-delay: 1.5s; }
        @keyframes float {
            0%, 100% { transform: translateY(0) scale(1); opacity: 0.6; }
            50% { transform: translateY(-20px) scale(1.5); opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="card">
        <!-- 樱花装饰 -->
        <div class="sakura">
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
        </div>
        
        <!-- 粒子光效 -->
        <div class="particles">
            <div class="particle"></div>
            <div class="particle"></div>
            <div class="particle"></div>
            <div class="particle"></div>
            <div class="particle"></div>
        </div>
        
        <!-- 稀有度 -->
        <div class="rarity">SSR</div>
        <div class="charm">+3</div>
        
        <!-- 刀光效果 -->
        <div class="blade-light"></div>
        
        <!-- 角色区域 -->
        <div class="character">
            <svg class="character-silhouette" viewBox="0 0 320 420">
                <!-- 深色和风战斗服女性 -->
                <defs>
                    <linearGradient id="dressGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                        <stop offset="0%" style="stop-color:#1a1a2e"/>
                        <stop offset="100%" style="stop-color:#0d0d1a"/>
                    </linearGradient>
                    <linearGradient id="hairGrad" x1="0%" y1="0%" x2="100%" y2="0%">
                        <stop offset="0%" style="stop-color:#0a0a14"/>
                        <stop offset="100%" style="stop-color:#1a1a2e"/>
                    </linearGradient>
                    <filter id="glow">
                        <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
                        <feMerge>
                            <feMergeNode in="coloredBlur"/>
                            <feMergeNode in="SourceGraphic"/>
                        </feMerge>
                    </filter>
                </defs>
                
                <!-- 头发 - 黑色长发飘动 -->
                <path d="M160 40 Q200 50 220 100 Q240 150 250 200 Q260 250 240 300 Q230 340 220 380 L200 380 Q210 320 200 280 Q190 240 170 220 Q160 200 160 180 L160 40" fill="url(#hairGrad)"/>
                <path d="M160 40 Q120 50 100 100 Q80 150 70 200 Q60 250 80 300 Q90 340 100 380 L120 380 Q110 320 120 280 Q130 240 150 220 Q160 200 160 180 L160 40" fill="url(#hairGrad)"/>
                
                <!-- 脸部轮廓 -->
                <ellipse cx="160" cy="120" rx="45" ry="55" fill="#e8d5c4"/>
                
                <!-- 冷峻表情 -->
                <path d="M135 115 Q145 112 155 115" stroke="#1a1a2e" stroke-width="2" fill="none"/>
                <path d="M165 115 Q175 112 185 115" stroke="#1a1a2e" stroke-width="2" fill="none"/>
                <!-- 锐利眼神 -->
                <path d="M130 108 L155 112 L150 115 Z" fill="#1a1a2e"/>
                <path d="M190 108 L165 112 L170 115 Z" fill="#1a1a2e"/>
                <circle cx="142" cy="113" r="3" fill="#ffd700" filter="url(#glow)"/>
                <circle cx="178" cy="113" r="3" fill="#ffd700" filter="url(#glow)"/>
                
                <!-- 深色和风战斗服 -->
                <path d="M115 175 Q100 200 95 260 Q90 320 100 380 L220 380 Q230 320 225 260 Q220 200 205 175 Q185 160 160 160 Q135 160 115 175" fill="url(#dressGrad)"/>
                
                <!-- 银色金属护肩 -->
                <ellipse cx="115" cy="185" rx="25" ry="15" fill="#a8a8a8"/>
                <ellipse cx="205" cy="185" rx="25" ry="15" fill="#a8a8a8"/>
                
                <!-- 腰带 -->
                <rect x="115" y="260" width="90" height="15" fill="#d4a574"/>
                
                <!-- 破损衣袖效果 -->
                <path d="M95 260 L85 300 L95 295 L90 320 L100 310 L95 380" stroke="#2d1f3d" stroke-width="2" fill="none"/>
                <path d="M225 260 L235 300 L225 295 L230 320 L220 310 L225 380" stroke="#2d1f3d" stroke-width="2" fill="none"/>
                
                <!-- 挥刀姿态的手臂 -->
                <path d="M205 185 Q250 200 280 150 Q290 130 320 100" stroke="#e8d5c4" stroke-width="18" fill="none" stroke-linecap="round"/>
                <path d="M115 185 Q80 220 60 280 Q50 320 40 360" stroke="#e8d5c4" stroke-width="16" fill="none" stroke-linecap="round"/>
            </svg>
        </div>
        
        <!-- 妖刀 -->
        <div class="cursed-blade"></div>
        
        <!-- 符文 -->
        <span class="runes">呪</span>
        <span class="runes">怨</span>
        <span class="runes">刃</span>
        
        <!-- 云纹装饰 -->
        <div class="cloud-pattern"></div>
        
        <!-- 名称框 -->
        <div class="name-box">
            <h2>妖刀姬</h2>
            <div class="skill">「杀戮」</div>
        </div>
    </div>
</body>
</html>
